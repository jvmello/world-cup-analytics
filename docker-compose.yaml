services:
  postgres:
    image: postgres:16
    container_name: worldcup_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - worldcup_network

  minio:
    image: minio/minio:latest
    container_name: worldcup_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    networks:
      - worldcup_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worldcup_app
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: bash
    networks:
      - worldcup_network
    depends_on:
      - postgres
      - minio

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worldcup_jupyter
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "${JUPYTER_PORT}:8888"
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
      --NotebookApp.password=''
    networks:
      - worldcup_network
    depends_on:
      - postgres
      - minio

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worldcup_streamlit
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "${STREAMLIT_PORT}:8501"
    command: streamlit run app/streamlit_app.py --server.address=0.0.0.0
    networks:
      - worldcup_network
    depends_on:
      - postgres
      - minio

volumes:
  postgres_data:
  minio_data:

networks:
  worldcup_network:
    driver: bridge