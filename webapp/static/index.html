<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="worldcup.dev Analytics — dados, contexto e história das Copas do Mundo.">
  <title>worldcup.dev · Analytics 2026</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/styles.css">
  <!--
    Umami (self-hosted, analytics.jvmello.dev) tracks section usage. app.js chama
    window.umami.track() a cada troca de rota da SPA (o script só rastreia o
    carregamento inicial sozinho).
  -->
  <script defer data-do-not-track="true" data-website-id="d7d864fa-a765-41fc-8cc0-985282908a15" src="https://analytics.jvmello.dev/script.js"></script>
  <script src="/static/app.js" defer></script>
</head>
<body data-skin="2026">
  <a class="skip-link" href="#content">Pular para o conteúdo</a>

  <header class="site-header">
    <div class="masthead shell">
      <a class="brand" href="/2026" aria-label="worldcup Analytics 2026 — início">
        <svg class="brand-logo" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
          <path d="M24 24 L24 2 A22 22 0 0 0 2 24 Z" fill="#9b5cf6"/>
          <path d="M24 24 L46 24 A22 22 0 0 0 24 2 Z" fill="#10ce8e"/>
          <path d="M24 24 L24 46 A22 22 0 0 0 46 24 Z" fill="#f2503b"/>
          <path d="M24 24 L2 24 A22 22 0 0 0 24 46 Z" fill="#338ef7"/>
          <circle cx="24" cy="24" r="12.5" fill="#141414"/>
          <rect x="17.4" y="24.4" width="3.6" height="6.6" rx="1" fill="#f4f2e9"/>
          <rect x="22.2" y="18.6" width="3.6" height="12.4" rx="1" fill="#f4f2e9"/>
          <rect x="27" y="21.8" width="3.6" height="9.2" rx="1" fill="#f4f2e9"/>
        </svg>
        <span class="brand-copy">
          <strong class="brand-word">worldcup</strong>
          <small>Analytics · 2026</small>
        </span>
      </a>

      <div class="edition-control">
        <label for="edition-select">Edição</label>
        <div class="select-wrap">
          <select id="edition-select" aria-describedby="coverage-line" disabled title="Somente a edição 2026 está disponível no momento.">
            <option value="2026">2026</option>
          </select>
        </div>
      </div>

      <div class="coverage" id="coverage-line" aria-live="polite" hidden>
        <span class="status-dot" aria-hidden="true"></span>
        <span id="coverage-text"></span>
      </div>
    </div>

    <div class="nav-layer">
      <div class="shell nav-row">
        <button class="menu-toggle" id="menu-toggle" type="button" aria-expanded="false" aria-controls="primary-nav">
          <span>Menu</span><span aria-hidden="true">☰</span>
        </button>
        <nav id="primary-nav" aria-label="Navegação principal"></nav>
        <a class="history-link" href="/about">Sobre</a>
      </div>
    </div>
  </header>

  <main id="content" tabindex="-1">
    <div class="shell">
      <div id="view" aria-live="polite" aria-busy="true"></div>
    </div>
  </main>

  <footer>
    <div class="shell footer-inner">
      <p><strong>World Cup Analytics</strong> — leitura editorial de dados de futebol.</p>
      <p id="footer-source">Créditos e fontes consolidados na documentação do projeto.</p>
      <p id="footer-version"></p>
    </div>
  </footer>

  <template id="loading-template">
    <section class="loading-state" aria-label="Carregando">
      <div class="skeleton skeleton-kicker"></div>
      <div class="skeleton skeleton-title"></div>
      <div class="skeleton skeleton-copy"></div>
      <div class="skeleton-grid">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </section>
  </template>
</body>
</html>
